# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Machearn
subtitle: Machearn's Tech&Life Node
description: My website to share tech note and life.
keywords: Computer Science, C/C++, Python, Linux
author: Machearn
language: en
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://machearn.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:machearn/machearn.github.io.git
  branch: gh-pages

theme_config:
  footer:
    copyright: Machearn

  scheme: Gemini

  pjax: true
  menu:
    home: / || fa fa-home
    tags: /tags/ || fa fa-tags
    sitemap: /sitemap.xml || fa fa-sitemap
    categories: /categories/ || fa fa-th
    archives: /archives/ || fa fa-archive
  

  avatar:
    url: https://i.imgur.com/Vs4ir8w.jpg
    rounded: true

  social:
    GitHub: https://github.com/machearn || fab fa-github
    E-Mail: mailto:machearn.n@gmail.com || fa fa-envelope

  codeblock:
    highlight_theme: solarized
    copy_button:
      enable: true
      show_result: true
      style: mac

  reading_progress:
    enable: true
    position: top
    color: "#37c6c0"
    height: 3px

  github_banner:
    enable: true
    permalink: https://github.com/machearn
    title: Follow me on GitHub

  disable_baidu_transformation: true
  index_with_subtitle: true
  google_site_verification: "FSli0LLWdxqE3pspqpiEX9fW8sLn5MhV4VHsBXjpNM8"


  google_analytics:
    tracking_id: UA-215744034-1